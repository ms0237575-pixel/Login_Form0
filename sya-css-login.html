<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Login — sya.css Style</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:   #ff6ec7;
    --purple: #a855f7;
    --cyan:   #22d3ee;
    --blue:   #6366f1;
    --white:  #ffffff;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a14;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── Animated orb background ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    animation: drift 8s ease-in-out infinite alternate;
  }

  .orb-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #7c3aed, #4f46e5);
    top: -140px; left: -100px;
    animation-duration: 9s;
  }

  .orb-2 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #ec4899, #f43f5e);
    bottom: -120px; right: -80px;
    animation-duration: 11s;
    animation-delay: -3s;
  }

  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #06b6d4, #3b82f6);
    bottom: 30%; left: 20%;
    animation-duration: 7s;
    animation-delay: -5s;
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(30px, -40px) scale(1.08); }
    100% { transform: translate(-20px, 30px) scale(0.96); }
  }

  /* ── Grid lines overlay ── */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 10;
    width: 420px;
    padding: 48px 44px 40px;
    border-radius: 28px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05) inset,
      0 32px 80px rgba(0,0,0,0.5);
    animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Glow border animation ── */
  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan), var(--purple));
    background-size: 300% 300%;
    animation: borderSpin 4s linear infinite;
    z-index: -1;
    opacity: 0.6;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: rgba(10, 10, 20, 0.78);
    z-index: -1;
  }

  @keyframes borderSpin {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── Logo / icon ── */
  .logo {
    width: 52px; height: 52px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 28px rgba(168, 85, 247, 0.6);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 28px rgba(168,85,247,0.55); }
    50%       { box-shadow: 0 0 46px rgba(236,72,153,0.75); }
  }

  .logo svg { width: 26px; height: 26px; fill: white; }

  /* ── Headings ── */
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.4px;
    margin-bottom: 6px;
  }

  .sub {
    text-align: center;
    font-size: 13.5px;
    color: rgba(255,255,255,0.42);
    margin-bottom: 36px;
  }

  /* ── Form ── */
  .field { margin-bottom: 18px; position: relative; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 15px;
    pointer-events: none;
    color: rgba(255,255,255,0.3);
    transition: color 0.25s;
    display: flex;
  }

  input {
    width: 100%;
    height: 50px;
    padding: 0 44px 0 44px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  }

  input::placeholder { color: rgba(255,255,255,0.2); }

  input:focus {
    border-color: var(--purple);
    background: rgba(168,85,247,0.08);
    box-shadow: 0 0 0 4px rgba(168,85,247,0.15), 0 0 20px rgba(168,85,247,0.1);
  }

  input:focus + .label-float,
  input:not(:placeholder-shown) + .label-float { top: -22px; }

  input:focus ~ .input-icon { color: var(--purple); }

  .eye-btn {
    position: absolute;
    right: 14px;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.28);
    display: flex;
    transition: color 0.2s;
    padding: 4px;
  }

  .eye-btn:hover { color: rgba(255,255,255,0.7); }

  /* ── Row: remember + forgot ── */
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0 28px;
  }

  .remember {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.45);
    user-select: none;
  }

  .remember input[type=checkbox] {
    width: 16px; height: 16px;
    padding: 0; margin: 0;
    accent-color: var(--purple);
    cursor: pointer;
  }

  .forgot {
    font-size: 13px;
    color: var(--purple);
    text-decoration: none;
    transition: color 0.2s, text-shadow 0.2s;
  }

  .forgot:hover {
    color: var(--pink);
    text-shadow: 0 0 12px rgba(236,72,153,0.6);
  }

  /* ── Primary button ── */
  .btn-primary {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    box-shadow: 0 8px 32px rgba(168,85,247,0.4);
    transition: transform 0.18s, box-shadow 0.18s;
    letter-spacing: 0.2px;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(168,85,247,0.55), 0 0 60px rgba(236,72,153,0.2);
  }

  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:active { transform: translateY(0); }

  /* Loading shimmer on button */
  .btn-primary .shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
    transform: translateX(-100%);
    animation: shimmer 2.4s infinite;
  }

  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 28px 0;
    color: rgba(255,255,255,0.2);
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  /* ── Social buttons ── */
  .socials { display: flex; gap: 12px; }

  .btn-social {
    flex: 1;
    height: 46px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.7);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.2s, border-color 0.2s, transform 0.18s;
  }

  .btn-social svg { width: 18px; height: 18px; }

  .btn-social:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.22);
    transform: translateY(-2px);
  }

  /* ── Sign-up link ── */
  .signup {
    text-align: center;
    margin-top: 28px;
    font-size: 13.5px;
    color: rgba(255,255,255,0.35);
  }

  .signup a {
    color: var(--cyan);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s, text-shadow 0.2s;
  }

  .signup a:hover {
    color: #fff;
    text-shadow: 0 0 14px rgba(34,211,238,0.7);
  }

  /* ── Floating particles ── */
  .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.4); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-100vh) scale(1); opacity: 0; }
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,50,0.95);
    border: 1px solid rgba(168,85,247,0.4);
    color: #fff;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 13.5px;
    font-weight: 500;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(168,85,247,0.2);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- Background orbs -->
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Grid overlay -->
<div class="grid"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Card -->
<div class="card">

  <!-- Logo -->
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
  </div>

  <h1>Welcome back</h1>
  <p class="sub">Sign in to continue your journey</p>

  <form id="loginForm" novalidate>

    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
        <button class="eye-btn" type="button" id="eyeBtn" aria-label="Toggle password visibility">
          <svg id="eyeIcon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button type="submit" class="btn-primary">
      <span class="shimmer"></span>
      Sign in
    </button>

  </form>

  <div class="divider">or continue with</div>

  <div class="socials">
    <button class="btn-social" type="button" onclick="handleSocial('Google')">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>

    <button class="btn-social" type="button" onclick="handleSocial('GitHub')">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
      </svg>
      GitHub
    </button>

    <button class="btn-social" type="button" onclick="handleSocial('Apple')">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Apple
    </button>
  </div>

  <p class="signup">Don't have an account? <a href="#">Create one free</a></p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  /* ── Particles ── */
  const container = document.getElementById('particles');
  const colors = ['#a855f7','#ec4899','#22d3ee','#6366f1','#f43f5e'];

  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = Math.random() * 4 + 2;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${Math.random() * 100}%;
      bottom:${Math.random() * -20}%;
      animation-duration:${Math.random() * 14 + 8}s;
      animation-delay:${Math.random() * 10}s;
      filter:blur(${Math.random() > 0.5 ? '1px' : '0'});
    `;
    container.appendChild(el);
  }

  /* ── Eye toggle ── */
  const pwInput = document.getElementById('password');
  document.getElementById('eyeBtn').addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  /* ── Toast ── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* ── Form submit ── */
  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('password').value;

    if (!email || !email.includes('@')) { showToast('⚠️  Please enter a valid email'); return; }
    if (pwd.length < 6) { showToast('⚠️  Password must be at least 6 characters'); return; }

    const btn = e.target.querySelector('.btn-primary');
    btn.textContent = '';
    btn.innerHTML = '<span class="shimmer"></span>Signing in…';
    btn.disabled = true;

    setTimeout(() => {
      btn.innerHTML = '<span class="shimmer"></span>✓ Welcome back!';
      btn.style.background = 'linear-gradient(135deg,#10b981,#0ea5e9)';
      btn.style.boxShadow  = '0 8px 32px rgba(16,185,129,0.45)';
      showToast('✓ Signed in successfully');
    }, 1800);
  });

  /* ── Social buttons ── */
  function handleSocial(provider) {
    showToast(`Connecting to ${provider}…`);
  }
</script>
</body>
</html>
